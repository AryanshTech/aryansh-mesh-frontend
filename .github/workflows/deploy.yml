name: Deploy Frontend

on:
  push:
    branches: [main]

concurrency:
  group: deploy-aryansh-mesh-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy config
        run: |
          set -a
          source deploy/github.env
          set +a
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=$GCP_WORKLOAD_IDENTITY_PROVIDER" >> "$GITHUB_ENV"
          echo "GCP_SERVICE_ACCOUNT=$GCP_SERVICE_ACCOUNT" >> "$GITHUB_ENV"
          echo "GCP_PROJECT_ID=$GCP_PROJECT_ID" >> "$GITHUB_ENV"

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project "${{ vars.FIREBASE_HOSTING_PROJECT || env.GCP_PROJECT_ID }}" --non-interactive
